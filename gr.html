<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>इतर पत्रे - क्ष-किरण वैज्ञानिक अधिकारी संघटना</title>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .gr-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            font-family: Arial, sans-serif;
            min-height: 60vh;
        }
        .page-title { color: #003366; text-align: center; margin-bottom: 10px; font-size: 28px; }
        .page-subtitle { text-align: center; color: #666; margin-bottom: 40px; font-size: 16px; }
        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
            justify-content: center;
        }
        .folder-card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        .folder-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border-color: #003366;
        }
        .folder-icon {
            font-size: 60px;
            color: #FFB020; 
            margin-bottom: 15px;
        }
        .folder-name {
            font-size: 18px;
            font-weight: bold;
            color: #003366;
            margin-bottom: 8px;
        }
        .folder-desc {
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
<body>

    <!-- हेडर आणि मेनू बार -->
    <header style="background-color: #003366; color: white; text-align: center; padding: 20px 0;">
        <h1 style="margin: 0; font-size: 26px;">क्ष-किरण वैज्ञानिक अधिकारी संघटना</h1>
        <h3 style="margin: 5px 0 0 0; font-size: 16px; font-weight: normal;">महाराष्ट्र राज्य</h3>
    </header>

    <nav style="background-color: #002244; text-align: center; padding: 10px 0;">
        <a href="index.html" style="color: white; text-decoration: none; margin: 0 15px; font-size: 16px;">मुख्यपृष्ठ</a>
        <a href="about.html" style="color: white; text-decoration: none; margin: 0 15px; font-size: 16px;">संघटनाबद्दल</a>
        <a href="executive.html" style="color: white; text-decoration: none; margin: 0 15px; font-size: 16px;">कार्यकारिणी</a>
        <a href="notice.html" style="color: white; text-decoration: none; margin: 0 15px; font-size: 16px;">नोटीस</a>
        <a href="gr.html" style="color: #FFB020; text-decoration: none; margin: 0 15px; font-size: 16px; font-weight: bold;">इतर पत्रे</a>
        <a href="gallery.html" style="color: white; text-decoration: none; margin: 0 15px; font-size: 16px;">गॅलरी</a>
        <a href="contact.html" style="color: white; text-decoration: none; margin: 0 15px; font-size: 16px;">संपर्क</a>
    </nav>

    <!-- मुख्य भाग (Direct Link Folder) -->
    <div class="gr-container">
        <h2 class="page-title">इतर अधिकृत पत्रे</h2>
        <p class="page-subtitle">संघटना स्तरावरील निर्णय व अधिकृत पत्रके</p>
        
        <div class="folder-grid">
            
            <!-- ⚠️ खालील href च्या आत तुमच्या गुगल ड्राईव्ह फोल्डरची लिंक नक्की पेस्ट करा -->
            <a href="https://drive.google.com/drive/folders/1gK3JAmP9CSgBkR446kpXpoTJrxTzPd1v" target="_blank" class="folder-card">
                <i class="fa-solid fa-folder-open folder-icon"></i>
                <div class="folder-name">संघटना अधिकृत पत्रके</div>
                <div class="folder-desc">गुगल ड्राईव्हवरून पत्रके डाउनलोड करा / पहा</div>
            </a>

        </div>
    </div>

    <!-- फुटर -->
    <footer style="background-color: #003366; color: white; text-align: center; padding: 15px 0; margin-top: 40px; font-size: 14px;">
        © 2026 क्ष-किरण वैज्ञानिक अधिकारी संघटना, महाराष्ट्र राज्य
    </footer>

</body>
</html>
