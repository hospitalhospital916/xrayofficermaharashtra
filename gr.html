<!-- १. इतर अधिकृत पत्रे दाखवणारा मुख्य भाग (HTML) -->
<div class="gr-container" style="max-width: 1200px; margin: 40px auto; padding: 0 20px; font-family: Arial, sans-serif;">
    <h2 class="page-title" style="color: #003366; text-align: center; margin-bottom: 10px; font-size: 28px;">इतर अधिकृत पत्रे 🔒</h2>
    <p class="page-subtitle" style="text-align: center; color: #666; margin-bottom: 40px; font-size: 16px;">फक्त मंजूर सदस्यांसाठी सुरक्षित सब-फोल्डर्स</p>

    <!-- इथे तुमचे सर्व फोल्डर्स ग्रिड स्वरूपात दिसतील -->

<!-- २. Firebase Scripts (Realtime Database साठी) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  // तुमचे अचूक फायरबेस कॉन्फिगरेशन
  const firebaseConfig = {
    apiKey: "AIzaSyDDYBnG3-x59Zt_eLzjcMRNVGpQVkKFKgc",
    authDomain: "xrayofficermaharashtra.firebaseapp.com",
    projectId: "xrayofficermaharashtra",
    storageBucket: "xrayofficermaharashtra.appspot.com",
    messagingSenderId: "447860581122",
    appId: "1:447860581122:web:f931bbc0ae219b8c1b581b",
    measurementId: "G-Y5L3VZWZJZ",
    databaseURL: "https://xrayofficermaharashtra-default-rtdb.firebaseio.com/"
  };
  
  // Firebase सुरू करा
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }
  const database = firebase.database();

  // तुमच्या मागणीनुसार नवीन तयार केलेले ४ फोल्डर्स
  const myFolders = [
    {
      id: "seva_jyeshthata",
      name: "सेवा ज्येष्ठता यादी",
      desc: "क्ष-किरण वैज्ञानिक अधिकाऱ्यांची अधिकृत राज्यस्तरीय ज्येष्ठता सूची."
    },
    {
      id: "raja_niyam",
      name: "रजेसंदर्भात नियम",
      desc: "सर्व प्रकारच्या नैमित्तिक (CL), अर्जित (EL) रजांचे नियम आणि परिपत्रके."
    },
    {
      id: "home_loan",
      name: "होम लोन संदर्भात माहिती",
      desc: "शासकीय कर्मचाऱ्यांसाठी गृहकर्ज नियम, व्याजदर आणि आवश्यक कागदपत्रे."
    },
    {
      id: "income_tax",
      name: "आयकर संदर्भात माहिती",
      desc: "वार्षिक प्राप्तिकर (Income Tax) नियम, सवलती आणि इन्व्हेस्टमेंट गाईड."
    }
  ];

  // स्क्रीनवर फोल्डर्स दाखवणारे फंक्शन
  function displayFolders() {
    const container = document.getElementById('folders-container');
    document.getElementById('loading-msg').style.display = 'none';
    container.innerHTML = ""; 

    myFolders.forEach((folder) => {
      const folderHtml = `
        <div class="card" onclick="openFolder('${folder.id}')" style="background: white; border-radius: 12px; padding: 30px 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; cursor: pointer; transition: all 0.3s ease;">
            <i class="fa-solid fa-folder-open" style="font-size: 60px; color: #FFB020; margin-bottom: 15px;"></i>
            <div style="font-size: 18px; font-weight: bold; color: #003366; margin-bottom: 8px;">${folder.name}</div>
            <div style="font-size: 14px; color: #777;">${folder.desc}</div>
        </div>
      `;
      container.innerHTML += folderHtml;
    });
  }

  // फोल्डर्स लोड करा
  displayFolders();

  // फोल्डरवर क्लिक केल्यावर काय व्हावे
  window.openFolder = function(folderId) {
    if(folderId === "seva_jyeshthata") {
        window.location.href = "seva-jyeshthata.html";
    } else if(folderId === "raja_niyam") {
        // तुमची गुगल ड्राईव्हची अनलॉक केलेली लिंक इथे जोडली आहे
        window.open("https://drive.google.com/drive/folders/1kvwI7XLMU7Wz5OlP8Qkk0Q98ELaWJB49?usp=drive_link", "_blank"); 
    } else if(folderId === "home_loan") {
        window.location.href = "home-loan.html";
    } else if(folderId === "income_tax") {
        window.location.href = "income-tax.html";
    } else {
        alert(folderId + " चे सुरक्षित कागदपत्रे लवकरच अपलोड केली जातील!");
    }
  }
</script>
