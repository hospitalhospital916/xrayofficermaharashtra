<!-- Font Awesome Link (फोल्डर आयकॉन्स दिसण्यासाठी आवश्यक) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  .gr-container {
    max-width: 1200px; 
    margin: 40px auto; 
    padding: 0 20px; 
    font-family: Arial, sans-serif;
  }
  .page-title {
    color: #003366; 
    text-align: center; 
    margin-bottom: 10px; 
    font-size: 28px;
    font-weight: bold;
  }
  .page-subtitle {
    text-align: center; 
    color: #666; 
    margin-bottom: 40px; 
    font-size: 16px;
  }
  .folder-grid {
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
    gap: 30px;
  }
  .folder-card {
    background: white; 
    border-radius: 12px; 
    padding: 30px 20px; 
    text-align: center; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
    border: 1px solid #e0e0e0; 
    cursor: pointer; 
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  /* फोल्डरवर माऊस नेल्यावर येणारा इफेक्ट */
  .folder-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    border-color: #3498db;
  }
  .folder-icon {
    font-size: 60px; 
    color: #FFB020; 
    margin-bottom: 15px;
  }
  .folder-title {
    font-size: 18px; 
    font-weight: bold; 
    color: #003366; 
    margin-bottom: 8px;
  }
  .folder-desc {
    font-size: 14px; 
    color: #777;
  }
  #loading-msg {
    text-align: center; 
    font-size: 18px; 
    color: #666;
  }
</style>

<div class="gr-container">
    <h2 class="page-title">इतर अधिकृत पत्रे 🔒</h2>
    <p class="page-subtitle">फक्त मंजूर सदस्यांसाठी सुरक्षित सब-फोल्डर्स</p>
    
    <div id="loading-msg">माहिती लोड होत आहे, कृपया थांबा...</div>
    
    <div class="folder-grid" id="folders-container"></div>
</div>

<script>

  const firebaseConfig = {

    storageBucket: "xrayofficermaharashtra.appspot.com",

    measurementId: "G-Y5L3VZWZJZ",
    databaseURL: "https://xrayofficermaharashtra-default-rtdb.firebaseio.com/"
  };

  // नवीन ४ फोल्डर्स पूर्णपणे वेगळे करून एकूण ८ फोल्डर्सची सुधारित यादी
  const myFolders = [
    {
      id: "seva_jyeshthata",
      name: "सेवा ज्येष्ठता यादी",
      desc: "क्ष-किरण वैज्ञानिक अधिकाऱ्यांची अधिकृत राज्यस्तरीय ज्येष्ठता सूची."
    },
    {
      id: "raja_niyam",
      name: "रजेसंदर्भात नियम",
      desc: "सर्व प्रकारच्या नैमित्तिक (CL), अर्जित (EL) रजांचे नियम आणि परिपत्रके."
    },
    {
      id: "home_loan",
      name: "होम लोन संदर्भात माहिती",
      desc: "शासकीय कर्मचाऱ्यांसाठी गृहकर्ज नियम, व्याजदर आणि आवश्यक कागदपत्रे."
    },
    {
      id: "income_tax",
      name: "आयकर संदर्भात माहिती",
      desc: "वार्षिक प्राप्तिकर (Income Tax) नियम, सवलती आणि इन्व्हेस्टमेंट गाईड."
    },
    {
      id: "seva_pustak",

      desc: "सेवापुस्तका संदर्भातील अधिकृत नियम, नोंदी आणि महत्त्वाची माहिती."
    },
    {
      id: "vaidyakiya_deyak",

    },
    {
      id: "mahatvache_form",
      name: "महत्त्वाचे फॉर्म",
      desc: "कार्यालयीन कामकाजासाठी लागणारे सर्व महत्त्वाचे फॉर्म्स आणि नमुने."
    },
    {
      id: "xray_patravyavahar",
      name: "क्ष-किरण विभाग पत्र व्यवहार",
      desc: "रेडिएशन सुरक्षा, TLD कार्ड, TB CAMP आणि विभागाशी संबंधित इतर सर्व पत्रे."
    }
  ];

  // स्क्रीनवर फोल्डर्स दाखवणारे फंक्शन
  function displayFolders() {
    const container = document.getElementById('folders-container');
    document.getElementById('loading-msg').style.display = 'none';
    container.innerHTML = ""; 

    myFolders.forEach((folder) => {
      const folderHtml = `
        <div class="folder-card" onclick="openFolder('${folder.id}')">
            <i class="fa-solid fa-folder-open folder-icon"></i>
            <div class="folder-title">${folder.name}</div>
            <div class="folder-desc">${folder.desc}</div>
        </div>
      `;
      container.innerHTML += folderHtml;
    });
  }

  // पेज लोड झाल्यावर फोल्डर्स दिसावेत यासाठी फंक्शन कॉल
  window.onload = function() {
    displayFolders();
  };

  // फोल्डरवर क्लिक केल्यावर काय व्हावे
  window.openFolder = function(folderId) {
    if(folderId === "seva_jyeshthata") {
        window.open("https://drive.google.com/drive/folders/12hWVtfMxie3AxTJC2W51TSAZ50e1VLsG?usp=drive_link", "_blank");
    } else if(folderId === "raja_niyam") {
        window.open("https://drive.google.com/drive/folders/1kvwI7XLMU7Wz5OlP8Qkk0Q98ELaWJB49?usp=drive_link", "_blank"); 
    } else if(folderId === "home_loan") {
        window.open("https://drive.google.com/drive/folders/1NQmNrfKv60H2vrc62wsrQjQXugaFofTa?usp=drive_link", "_blank");
    } else if(folderId === "income_tax") {
        window.location.href = "income-tax.html";
    } else if(folderId === "seva_pustak") {
        window.open("https://drive.google.com/drive/folders/1cxIg5I5XqOE6JuOPevEmeexShQpD0qzQ?usp=drive_link", "_blank");
    } else if(folderId === "vaidyakiya_deyak") {
        // टीप: इथे तुमची वैद्यकीय देयकाची गूगल ड्राईव्ह लिंक टाका
        window.open("येथे_तुमची_वैद्यकीय_देयक_लिंक_टाका", "_blank");
    } else if(folderId === "mahatvache_form") {
        window.open("https://drive.google.com/drive/folders/1QXIhpY_UbJQqQq2YsNepgIM3mH8Lmgqv?usp=drive_link", "_blank");
    } else if(folderId === "xray_patravyavahar") {
        window.open("https://drive.google.com/drive/folders/1GnUX2PJv3E4-rNv4o3GCQ7eCSkzTiUfM?usp=sharing", "_blank");
    } else {
        alert("या फोल्डरची माहिती लवकरच उपलब्ध होईल!");
    }
  }
</script>
