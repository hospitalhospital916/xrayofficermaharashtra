<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <title>नवीन नोंदणी | क्ष किरण संघटना</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .reg-wrapper { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; border-top: 6px solid #0B3D91; }
    h2 { color: #0B3D91; text-align: center; margin-bottom: 20px; }
    .input-box { margin-bottom: 15px; }
    .input-box label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
    .input-box input, .input-box select, .input-box textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
    button { width: 100%; background: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div class="reg-wrapper">
    <h2>नवीन सदस्य नोंदणी</h2>
    <div class="input-box"><label>नाव</label><input type="text" id="firstName" placeholder="पहिले नाव" required></div>
    <div class="input-box"><label>वडिलांचे / मधले नाव</label><input type="text" id="middleName" placeholder="मधले नाव"></div>
    <div class="input-box"><label>आडनाव</label><input type="text" id="lastName" placeholder="आडनाव" required></div>
    
    <!-- नवीन रकाना -->
    <div class="input-box">
      <label>लिंग (Gender)</label>
      <select id="gender">
        <option value="पुरुष">पुरुष (Male)</option>
        <option value="महिला">महिला (Female)</option>
      </select>
    </div>

    <div class="input-box"><label>मोबाईल क्रमांक</label><input type="tel" id="mobile" required></div>
    <div class="input-box"><label>ईमेल आयडी</label><input type="email" id="email" required></div>
    <div class="input-box"><label>कायमचा पत्ता</label><textarea id="address" rows="2"></textarea></div>
    <div class="input-box"><label>पासवर्ड</label><input type="password" id="password" required></div>
    <button id="regBtn">नोंदणी करा</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBVRXAra9pKpXbZYO4YkvbhuyWlKL8QVyk", authDomain: "xrayunionmah.firebaseapp.com", projectId: "xrayunionmah", storageBucket: "xrayunionmah.firebasestorage.app", messagingSenderId: "763805226978", appId: "1:763805226978:web:6bae81a0b6358b47d88bbb" };
    const auth = getAuth(initializeApp(firebaseConfig));
    const db = getFirestore(initializeApp(firebaseConfig));

    document.getElementById("regBtn").onclick = async () => {
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value);
        await setDoc(doc(db, "members", userCredential.user.uid), {
          पूर्ण_नाव: `${document.getElementById("firstName").value} ${document.getElementById("middleName").value} ${document.getElementById("lastName").value}`,
          लिंग: document.getElementById("gender").value, // लिंग सेव्ह होत आहे
          मोबाईल: document.getElementById("mobile").value,
          ईमेल: document.getElementById("email").value,
          कायमचा_पत्ता: document.getElementById("address").value,
          स्थिती: "प्रलंबित",
          अॅक्सेस: "चालू"
        });
        alert("नोंदणी यशस्वी!");
      } catch (e) { alert("एरर: " + e.message); }
    };
  </script>
</body>
</html>
