<!DOCTYPE html>
<html lang="mr">
<head>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#f4f6f9; color:#333; }
        
        header { background:#003366; color:white; text-align:center; padding:20px 15px; }
        header h1 { font-size:26px; }
        
        nav { background:#1a252f; text-align:center; padding:12px; }
        nav a { color:white; text-decoration:none; padding:10px 15px; display:inline-block; font-weight: bold; }
        nav a:hover { color:#ffcc00; }
        
        .form-container {
            max-width: 800px;
            margin: 30px auto;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .form-container h2 {
            color: #003366;
            margin-bottom: 20px;
            padding-top: 10px;
        }

        /* Responsive Iframe Container */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            height: 1200px; /* Height adjusted for the Google Form */
            overflow: hidden;
        }
        
        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        footer { background:#1a252f; color:white; padding:20px; text-align:center; margin-top: 40px;}
    </style>
</head>

<body>

    <div class="iframe-wrapper">

</footer>
