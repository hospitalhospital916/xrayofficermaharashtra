<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>गॅलरी - क्ष-किरण वैज्ञानिक अधिकारी संघटना</title>
    <style>
        :root { --primary-color: #0B3D91; } /* तुमचा निळा रंग */
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #f4f4f4; }
        header { background-color: var(--primary-color); color: white; padding: 20px; text-align: center; }
        
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        
        .gallery-item {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 5px;
        }
        
        .back-btn { display: block; text-align: center; margin: 20px; color: var(--primary-color); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>आमची गॅलरी</h1>
    </header>

    <a href="index.html" class="back-btn">← मुख्यपृष्ठावर परत जा</a>

    <div class="gallery-container">
        <!-- इथे तुमचे फोटो टाका -->
        <div class="gallery-item"><img src="photo1.jpg" alt="फोटो १"></div>
        <div class="gallery-item"><img src="photo2.jpg" alt="फोटो २"></div>
        <div class="gallery-item"><img src="photo3.jpg" alt="फोटो ३"></div>
        <div class="gallery-item"><img src="photo4.jpg" alt="फोटो ४"></div>
    </div>

</body>
</html>
