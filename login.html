<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ॲडमिन लॉगिन - क्ष किरण संघटना</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 100%; max-width: 350px; text-align: center; border-top: 5px solid #0B3D91; }
    .login-card img { max-width: 80px; margin-bottom: 10px; }
    h2 { color: #0B3D91; margin-top: 0; margin-bottom: 20px; font-size: 1.5rem; }
    input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; outline: none; }
    input:focus { border-color: #0B3D91; box-shadow: 0 0 5px rgba(11, 61, 145, 0.3); }
    button { width: 95%; background: #0B3D91; color: white; border: none; padding: 12px; border-radius: 6px; font-size: 1.1rem; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; }
    button:hover { background: #082a63; transform: translateY(-2px); }
    #errorMsg { color: red; margin-top: 15px; font-size: 0.9rem; font-weight: bold; }
  </style>
</head>
<body>

  <div class="login-card">
    <h2>🔒 सुरक्षित ॲडमिन लॉगिन</h2>
    <input type="email" id="email" placeholder="ईमेल आयडी (Email)" required>
    <input type="password" id="password" placeholder="पासवर्ड (Password)" required>
    <button id="loginBtn">लॉगिन करा</button>
    <p id="errorMsg"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBVRXAra9pKpXbZYO4YkvbhuyWlKL8QVyk",
      authDomain: "xrayunionmah.firebaseapp.com",
      projectId: "xrayunionmah",
      storageBucket: "xrayunionmah.firebasestorage.app",
      messagingSenderId: "763805226978",
      appId: "1:763805226978:web:6bae81a0b6358b47d88bbb"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("loginBtn").addEventListener("click", () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");

      if(!email || !password) {
        errorMsg.innerText = "⚠️ कृपया ईमेल आणि पासवर्ड दोन्ही टाका.";
        return;
      }

      errorMsg.innerText = "लॉगिन होत आहे... ⏳";
      errorMsg.style.color = "blue";

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          // यशस्वी लॉगिन झाल्यावर admin.html वर पाठवा
          window.location.href = "admin.html"; 
        })
        .catch((error) => {
          errorMsg.style.color = "red";
          errorMsg.innerText = "❌ चुकीचा ईमेल किंवा पासवर्ड! पुन्हा प्रयत्न करा.";
          console.error(error);
        });
    });
  </script>
</body>
</html>
