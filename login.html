<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>लॉगिन - क्ष किरण संघटना</title>
  
  <!-- FontAwesome Icons for Eye Icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    
    .login-wrapper { background: white; padding: 40px 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; border-top: 6px solid #0B3D91; position: relative; }
    
    .login-icon { background: #0B3D91; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; margin: -70px auto 20px auto; box-shadow: 0 4px 10px rgba(11, 61, 145, 0.4); border: 4px solid white; }
    
    h2 { color: #0B3D91; margin-top: 0; margin-bottom: 5px; font-size: 1.6rem; }
    p.subtitle { color: #666; font-size: 0.9rem; margin-bottom: 25px; }

    .input-box { position: relative; margin-bottom: 20px; text-align: left; }
    .input-box i.input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #888; }
    .input-box input { width: 100%; padding: 12px 15px 12px 40px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; outline: none; box-sizing: border-box; transition: 0.3s; }
    .input-box input:focus { border-color: #0B3D91; box-shadow: 0 0 8px rgba(11, 61, 145, 0.2); }
    
    /* Password Eye Icon */
    .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; }
    .toggle-password:hover { color: #0B3D91; }

    button { width: 100%; background: #0B3D91; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 10px rgba(11, 61, 145, 0.2); }
    button:hover { background: #082a63; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(11, 61, 145, 0.3); }
    button:disabled { background: #999; cursor: not-allowed; transform: none; box-shadow: none; }

    #messageBox { margin-top: 15px; font-size: 0.95rem; font-weight: bold; min-height: 20px; }
    
    .extra-links { margin-top: 20px; font-size: 0.9rem; display: flex; justify-content: space-between; }
    .extra-links a { color: #0B3D91; text-decoration: none; font-weight: 600; }
    .extra-links a:hover { text-decoration: underline; }
    
    .register-link { display: block; margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; font-size: 0.9rem; color: #555; }
    .register-link a { color: #28a745; font-weight: bold; text-decoration: none; }
    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-icon"><i class="fa-solid fa-user-lock"></i></div>
    <h2>लॉगिन पोर्टल</h2>
    <p class="subtitle">क्ष किरण वैज्ञानिक अधिकारी संघटना, महाराष्ट्र</p>

    <div class="input-box">
      <i class="fa-solid fa-envelope input-icon"></i>
      <input type="email" id="email" placeholder="ईमेल आयडी (Email)" required>
    </div>
    
    <div class="input-box">
      <i class="fa-solid fa-lock input-icon"></i>
      <input type="password" id="password" placeholder="पासवर्ड (Password)" required>
      <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
    </div>

    <div class="extra-links">
      <label style="cursor:pointer;"><input type="checkbox"> मला लक्षात ठेवा</label>
      <a href="#">पासवर्ड विसरलात?</a>
    </div>

    <button id="loginBtn" style="margin-top: 20px;">लॉगिन करा</button>
    <div id="messageBox"></div>

    <div class="register-link">
      नवीन सदस्य आहात? <a href="register.html">येथे नोंदणी करा</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    // Firestore imports added for security checks
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBVRXAra9pKpXbZYO4YkvbhuyWlKL8QVyk",
      authDomain: "xrayunionmah.firebaseapp.com",
      projectId: "xrayunionmah",
      storageBucket: "xrayunionmah.firebasestorage.app",
      messagingSenderId: "763805226978",
      appId: "1:763805226978:web:6bae81a0b6358b47d88bbb"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 👁️ Password Show/Hide Logic
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");
    togglePassword.addEventListener("click", function () {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
      this.classList.toggle("fa-eye-slash");
    });

    // 🚀 Login & Security Check Logic
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = passwordInput.value;
      const msgBox = document.getElementById("messageBox");
      const loginBtn = document.getElementById("loginBtn");

      if(!email || !password) {
        msgBox.innerHTML = "<span style='color:red;'>⚠️ कृपया ईमेल आणि पासवर्ड टाका.</span>";
        return;
      }

      msgBox.innerHTML = "<span style='color:blue;'><i class='fa-solid fa-spinner fa-spin'></i> माहिती तपासत आहे...</span>";
      loginBtn.disabled = true;

      try {
        // Step 1: Firebase Auth द्वारे पासवर्ड चेक करा
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Step 2: Firestore मध्ये युजर 'सदस्य' (Member) आहे का ते तपासा
        const q = query(collection(db, "members"), where("ईमेल", "==", email));
        const querySnapshot = await getDocs(q);

        if (!querySnapshot.empty) {
          // युजरला 'members' टेबलमध्ये रेकॉर्ड सापडला (म्हणजे तो सदस्य आहे)
          let memberData;
          querySnapshot.forEach((doc) => { memberData = doc.data(); });

          // 🛡️ Security Check 1: मंजुरी मिळाली आहे का?
          if (memberData.स्थिती === "प्रलंबित") {
            msgBox.innerHTML = "<span style='color:#ff9800;'>⏳ तुमचा अर्ज ॲडमिनच्या मंजुरीच्या प्रतीक्षेत आहे.</span>";
            await signOut(auth); // बाहेर काढा
          } 
          // 🛡️ Security Check 2: लॉगिन अॅक्सेस चालू आहे का?
          else if (memberData.अॅक्सेस === "बंद") {
            msgBox.innerHTML = "<span style='color:red;'>🚫 तुमचा लॉगिन अॅक्सेस बंद आहे. ॲडमिनशी संपर्क साधा.</span>";
            await signOut(auth); // बाहेर काढा
          } 
          // ✅ सर्व बरोबर असेल तर 'मेंबर डॅशबोर्ड' ला पाठवा
          else {
            msgBox.innerHTML = "<span style='color:green;'>✅ लॉगिन यशस्वी! डॅशबोर्ड उघडत आहे...</span>";
            setTimeout(() => { window.location.href = "member-dashboard.html"; }, 1000);
          }
        } else {
          // जर 'members' टेबलमध्ये रेकॉर्ड सापडला नाही, पण लॉगिन झाले...
          // याचा अर्थ हा 'मुख्य ॲडमिन' (Super Admin) आहे! 
          msgBox.innerHTML = "<span style='color:green;'>✅ ॲडमिन लॉगिन यशस्वी!</span>";
          setTimeout(() => { window.location.href = "admin.html"; }, 1000);
        }

      } catch (error) {
        // लॉगिन फेल झाले (चुकीचा पासवर्ड किंवा ईमेल)
        msgBox.innerHTML = "<span style='color:red;'>❌ चुकीचा ईमेल किंवा पासवर्ड!</span>";
        console.error(error);
      } finally {
        loginBtn.disabled = false; // बटन पुन्हा चालू करा
      }
    });
  </script>
</body>
</html>
