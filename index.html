<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>क्ष किरण वैज्ञानिक अधिकारी संघटना, महाराष्ट्र राज्य</title>
    <!-- [तुमचे जुने स्टाईल आणि Meta टॅग्स येथे ठेवा] -->
    <style>
        .ticker-wrap { background: #FFD700; padding: 10px; overflow: hidden; margin: 10px 0; border: 2px solid #0B3D91; border-radius: 5px; }
    </style>
</head>
<body>
    <!-- [तुमचे Header आणि Nav जसेच्या तसे] -->
    <header><h1>क्ष किरण वैज्ञानिक अधिकारी (गट-क) कर्मचारी संघटना, महाराष्ट्र राज्य</h1></header>

    <!-- फिरणारी पट्टी -->
    <div class="ticker-wrap">
        <marquee id="news-ticker" behavior="scroll" direction="left" style="font-weight: bold; color: #0B3D91;">
            माहिती लोड होत आहे...
        </marquee>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBVRXAra9pKpXbZYO4YkvbhuyWlKL8QVyk",
          authDomain: "xrayunionmah.firebaseapp.com",
          projectId: "xrayunionmah",
          storageBucket: "xrayunionmah.firebasestorage.app",
          messagingSenderId: "763805226978",
          appId: "1:763805226978:web:6bae81a0b6358b47d88bbb",
          measurementId: "G-EQS6WH6XLF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // डेटाबेस मधून सूचना वाचणे
        onSnapshot(doc(db, "settings", "marquee"), (doc) => {
            if (doc.exists()) {
                document.getElementById("news-ticker").innerText = doc.data().text;
            }
        });
    </script>
</body>
</html>
