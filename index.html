<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>क्ष किरण वैज्ञानिक अधिकारी (गट-क) कर्मचारी संघटना, महाराष्ट्र राज्य</title>
  <style>
    :root { --primary-blue: #0B3D91; --secondary-gold: #FFD700; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
    body { background-color: #f4f7f6; }
    header { text-align: center; padding: 25px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    nav { background: #0B3D91; padding: 15px; text-align: center; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
    nav a { color: #fff; text-decoration: none; font-weight: bold; }
    .ticker-wrap { background: #0B3D91; border: 2px solid var(--secondary-gold); padding: 10px; margin: 15px auto; max-width: 1000px; border-radius: 5px; }
    #news-ticker { font-weight: bold; color: var(--secondary-gold); }
    .container { max-width: 1100px; margin: auto; padding: 20px; }
    .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
    footer { background: #0B2240; color: white; text-align: center; padding: 25px; }
  </style>
</head>
<body>
  <header><h1>क्ष किरण वैज्ञानिक अधिकारी (गट-क) कर्मचारी संघटना, महाराष्ट्र राज्य</h1></header>
  <nav>
    <a href="index.html">मुख्यपृष्ठ</a>
    <a href="admin.html">Admin Login</a>
  </nav>

  <div class="ticker-wrap">
    <marquee id="news-ticker">माहिती लोड होत आहे...</marquee>
  </div>

  <div class="container">
    <section class="card">
      <h2>🔔 ताज्या घडामोडी</h2>
      <p id="latest-news">माहिती लोड होत आहे...</p>
    </section>
  </div>

  <footer><p>&copy; २०२६ क्ष किरण वैज्ञानिक अधिकारी (गट-क) कर्मचारी संघटना.</p></footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBVRXAra9pKpXbZYO4YkvbhuyWlKL8QVyk",
      authDomain: "xrayunionmah.firebaseapp.com",
      projectId: "xrayunionmah",
      storageBucket: "xrayunionmah.firebasestorage.app",
      messagingSenderId: "763805226978",
      appId: "1:763805226978:web:6bae81a0b6358b47d88bbb"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    onSnapshot(doc(db, "settings", "marquee"), (snap) => {
      if (snap.exists()) document.getElementById("news-ticker").innerText = snap.data().text;
    });
    onSnapshot(doc(db, "settings", "latest_news"), (snap) => {
      if (snap.exists()) document.getElementById("latest-news").innerText = snap.data().text;
    });
  </script>
</body>
</html>
