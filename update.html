<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ऑटो-अपडेट (मोबाईल व्हर्जन)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #eef2f7; padding: 20px; text-align: center; }
    .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 6px solid #0B3D91; margin-top: 20px; }
    h3 { color: #0B3D91; margin-top: 0; }
    input[type="file"] { margin: 15px 0; padding: 10px; border: 2px dashed #0B3D91; width: 100%; box-sizing: border-box; border-radius: 8px; background: #f8f9fa; }
    button { background: #28a745; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; width: 100%; box-shadow: 0 4px 10px rgba(40,167,69,0.3); }
    button:disabled { background: #999; box-shadow: none; }
    #status { margin-top: 20px; font-weight: bold; font-size: 1rem; color: #dc3545; padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>

  <div class="container">
    <h3>🚀 डेटाबेस स्मार्ट अपडेटर</h3>
    <p style="font-size: 0.9rem; color: #555;">मोबाईल फाईल मॅनेजरमधून एक्सेल फाईल निवडा आणि खालील बटनावर क्लिक करा.</p>
    
    <input type="file" id="excelFile" accept=".xlsx, .xls">
    <button id="processBtn">डेटाबेस अपडेट सुरू करा</button>
    
    <div id="status"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, getDocs, deleteDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBVRXAra9pKpXbZYO4YkvbhuyWlKL8QVyk",
      authDomain: "xrayunionmah.firebaseapp.com",
      projectId: "xrayunionmah",
      storageBucket: "xrayunionmah.firebasestorage.app",
      messagingSenderId: "763805226978",
      appId: "1:763805226978:web:6bae81a0b6358b47d88bbb"
    };
    const app = initializeApp(firebaseConfig); 
    const db = getFirestore(app);

    document.getElementById('processBtn').onclick = async () => {
      const file = document.getElementById('excelFile').files[0];
      const statusBox = document.getElementById('status');
      const btn = document.getElementById('processBtn');

      if(!file) { alert("⚠️ कृपया आधी एक्सेल फाईल निवडा."); return; }
      
      btn.disabled = true;
      const reader = new FileReader();
      
      reader.onload = async (e) => {
        try {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, {type: 'array'});
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(sheet);
          
          // १. जुना डेटा डिलीट करणे
          statusBox.innerHTML = "⏳ जुना डेटा डिलीट करत आहे...";
          statusBox.style.background = "#fff3cd";
          const snap = await getDocs(collection(db, "members"));
          let delCount = 0;
          for (let d of snap.docs) {
            await deleteDoc(doc(db, "members", d.id));
            delCount++;
            statusBox.innerHTML = `⏳ जुने ${delCount} रेकॉर्ड्स डिलीट झाले...`;
          }
          
          // २. नवीन डेटा ॲड करणे
          statusBox.innerHTML = "⏳ नवीन सदस्य जोडत आहे... थांबा.";
          let successCount = 0;
          
          for (let row of rows) {
            let rawMob = String(row["मोबाईल क्रमांक"] || "");
            let mobile = rawMob.replace(/\D/g, ''); 
            if(mobile.length > 10) mobile = mobile.slice(-10);
            if(mobile.length < 10) continue; 
            
            // नावे एकत्र करणे आणि 'श्री' काढणे
            let rawFName = String(row["नाव"] || "").replace(/^(श्री|श्रीमती|श्री\.)\s*/, "").trim();
            let rawMName = String(row["वडिलांचे / मधले नाव"] || "").replace(/^(श्री|श्रीमती|श्री\.)\s*/, "").trim();
            let rawLName = String(row["आडनाव"] || "").trim();
            
            let parts = [...rawFName.split(" "), ...rawMName.split(" "), ...rawLName.split(" ")];
            let uniqueParts = [];
            parts.forEach(p => { if(p && p !== "nan" && !uniqueParts.includes(p)) uniqueParts.push(p); });
            let fullName = uniqueParts.join(" ");
            
            if(fullName === "") continue;

            let address = row["कार्यरत रुग्णालयाचे नाव व पत्ता"] || "-";
            let designation = row["पदाचे नाव"] || "क्ष-किरण वैज्ञानिक अधिकारी";
            
            await addDoc(collection(db, "members"), {
              पूर्ण_नाव: fullName, नाव: rawFName, आडनाव: rawLName, मोबाईल: mobile, मोबाईल_क्रमांक: mobile,
              पत्ता: address, कायमचा_पत्ता: address, पद: designation, सेवार्थ_आयडी: row["सेवार्थ आयडी क्रमांक"] || "-",
              मंडळ: "-", जिल्हा: "-", ईमेल: "-", स्थिती: "मंजूर", अॅक्सेस: "चालू", फी_स्थिती: "बाकी"
            });
            
            successCount++;
            statusBox.innerHTML = `⏳ ${successCount} सदस्य जोडले...`;
          }
          
          statusBox.innerHTML = `✅ अभिनंदन! सर्व जुना डेटा डिलीट झाला आहे आणि <b>${successCount}</b> नवीन सदस्य अचूक नावांसह जोडले गेले आहेत.`;
          statusBox.style.color = "#155724";
          statusBox.style.background = "#d4edda";

        } catch (error) {
          statusBox.innerHTML = "❌ काहीतरी अडचण आली. पुन्हा प्रयत्न करा.";
          console.error(error);
        } finally {
          btn.disabled = false;
        }
      };
      reader.readAsArrayBuffer(file);
    };
  </script>
</body>
</html>
