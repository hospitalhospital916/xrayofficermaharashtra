<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <style>
    body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
    .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
    th { background: #0B3D91; color: white; padding: 10px; text-align: left; }
    td { border-bottom: 1px solid #ddd; padding: 8px; }
    button { padding: 5px 8px; cursor: pointer; border: none; border-radius: 4px; color: white; margin: 2px; font-size: 11px; }
    .btn-wa { background: #25D366; }
    .btn-call { background: #6610f2; }
  </style>
</head>
<body>

<div class="card">
  <h2>सभासद डेटा डॅशबोर्ड</h2>
  <div id="usersList" style="overflow-x:auto;">Loading...</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = { /* तुमचे कॉन्फिगरेशन इथे ठेवा */ };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.loadUsers = async () => {
    const snap = await getDocs(collection(db, "members"));
    let html = '<table><tr><th>पूर्ण नाव</th><th>रुग्णालय</th><th>मोबाईल</th><th>सेवार्थ आयडी</th><th>Action</th></tr>';
    
    snap.forEach(d => {
      const data = d.data();
      // पूर्ण नाव तयार करणे
      const fullName = `${data["नाव"] || ''} ${data["वडिलांचे / मधले नाव"] || ''} ${data["आडनाव"] || ''}`;
      const mob = data["मोबाईल क्रमांक"] || "";
      
      html += `<tr>
        <td>${fullName}</td>
        <td>${data["कार्यरत रुग्णालयाचे नाव व पत्ता"] || ''}</td>
        <td>${mob}</td>
        <td>${data["सेवार्थ आयडी क्रमांक"] || ''}</td>
        <td>
            <button class="btn-wa" onclick="window.open('https://wa.me/91${mob}')">💬 WhatsApp</button>
            <button class="btn-call" onclick="window.location.href='tel:${mob}'">📞 Call</button>
        </td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById("usersList").innerHTML = html;
  };

  loadUsers();
</script>
</body>
</html>
