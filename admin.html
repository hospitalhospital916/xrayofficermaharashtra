<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अ‍ॅडमिन डॅशबोर्ड - पत्रके व PDF व्यवस्थापन</title>
    <style>
        /* सुंदर डिझाईन (CSS) */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e9ecef; margin: 0; padding: 0; }
        
        header { background: #003366; color: white; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 24px; }
        .back-link { display: inline-block; margin-top: 10px; color: #ffcc00; text-decoration: none; font-weight: bold; border: 1px solid #ffcc00; padding: 5px 15px; border-radius: 5px; transition: 0.3s; }
        .back-link:hover { background: #ffcc00; color: #003366; }

        .admin-container { max-width: 800px; margin: 40px auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h2 { color: #003366; text-align: center; border-bottom: 3px solid #ffcc00; padding-bottom: 10px; margin-bottom: 30px; font-size: 26px; }
        h3 { color: #003366; margin-top: 0; font-size: 20px; }
        
        .form-section { background: #f8f9fa; padding: 25px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #ddd; border-left: 5px solid #003366; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: 0.3s; }
        .form-group input:focus, .form-group select:focus { border-color: #003366; outline: none; box-shadow: 0 0 5px rgba(0,51,102,0.3); }
        
        .btn { width: 100%; padding: 14px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-blue { background: #003366; }
        .btn-blue:hover { background: #001f3f; }
        .btn-green { background: #28a745; }
        .btn-green:hover { background: #218838; }
        
        .status-msg { margin-top: 15px; font-weight: bold; font-size: 15px; text-align: center; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

<header>
    <h1>अ‍ॅडमिन डॅशबोर्ड (पत्रके अपलोड सिस्टीम)</h1>
    <a href="index.html" class="back-link">⬅ मुख्यपृष्ठावर परत जा</a>
</header>

<div class="admin-container">
    <h2>सिस्टीम व्यवस्थापन</h2>

    <!-- भाग १: नवीन सब-फोल्डर तयार करणे -->
    <div class="form-section">
        <h3>१. नवीन सब-फोल्डर (वर्गवारी) तयार करा</h3>
        <form id="create-folder-form">
            <div class="form-group">
                <label>सब-फोल्डरचे नाव (उदा. बदली संदर्भातील पत्रे)</label>
                <input type="text" id="folder-name" required placeholder="फोल्डरचे नाव टाका">
            </div>
            <div class="form-group">
                <label>थोडक्यात माहिती (Description)</label>
                <input type="text" id="folder-desc" placeholder="या फोल्डरमध्ये कोणत्या फाईल्स असतील ते लिहा">
            </div>
            <button type="submit" class="btn btn-blue">नवा फोल्डर तयार करा</button>
        </form>
        <div id="folder-status" class="status-msg" style="display:none;"></div>
    </div>

    <!-- भाग २: तयार केलेल्या सब-फोल्डरमध्ये PDF फाईल अपलोड करणे -->
    <div class="form-section">
        <h3>२. सब-फोल्डरमध्ये नवीन PDF / GR अपलोड करा</h3>
        <form id="upload-pdf-form">
            <div class="form-group">
                <label>योग्य सब-फोल्डर निवडा</label>
                <select id="select-folder" required>
                    <option value="">-- कृपया फोल्डर निवडा --</option>
                    <!-- डेटाबेसमधून आलेले फोल्डर्स इथे दिसतील -->
                </select>
            </div>
            <div class="form-group">
                <label>पत्रक / जीआर चे नाव (Title)</label>
                <input type="text" id="pdf-title" required placeholder="उदा. वरिष्ठ वेतन श्रेणी परिपत्रक २०२६">
            </div>
            <div class="form-group">
                <label>PDF फाईल निवडा (Select PDF)</label>
                <input type="file" id="pdf-file" accept="application/pdf" required>
            </div>
            <button type="submit" class="btn btn-green">डेटाबेसमध्ये फाईल अपलोड करा</button>
        </form>
        <div id="upload-status" class="status-msg" style="display:none;"></div>
    </div>
</div>

<!-- Firebase Scripts (तुमच्या अधिकृत वेबसाईटची माहिती) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    // तुमची खरी Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyDDYBnG3-x59Zt_eLzjcMRNVGpQVkKFKgc",
        authDomain: "xrayofficermaharashtra.firebaseapp.com",
        databaseURL: "https://xrayofficermaharashtra-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "xrayofficermaharashtra",
        storageBucket: "xrayofficermaharashtra.firebasestorage.app",
        messagingSenderId: "447860581122",
        appId: "1:447860581122:web:f931bbc0ae219b8c1b581b",
        measurementId: "G-Y5L3VZWZJZ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    function showStatus(elementId, message, type) {
        const el = document.getElementById(elementId);
        el.style.display = "block";
        el.className = "status-msg " + type;
        el.innerText = message;
    }

    // १. नवीन सब-फोल्डर तयार करणे
    document.getElementById('create-folder-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('folder-name').value;
        const description = document.getElementById('folder-desc').value;

        showStatus('folder-status', '⏳ फोल्डर तयार होत आहे...', 'loading');

        try {
            await addDoc(collection(db, "subfolders"), {
                name: name,
                description: description,
                createdAt: new Date()
            });
            showStatus('folder-status', '✅ नवीन सब-फोल्डर यशस्वीरीत्या तयार झाले!', 'success');
            document.getElementById('create-folder-form').reset();
            loadFoldersInDropdown(); 
        } catch (error) {
            showStatus('folder-status', '❌ त्रुटी: ' + error.message, 'error');
        }
    });

    // ड्रॉपडाऊनमध्ये सध्याचे सर्व सब-फोल्डर्स लोड करणे
    async function loadFoldersInDropdown() {
        const dropdown = document.getElementById('select-folder');
        dropdown.innerHTML = '<option value="">-- कृपया फोल्डर निवडा --</option>';
        try {
            const querySnapshot = await getDocs(collection(db, "subfolders"));
            querySnapshot.forEach((doc) => {
                // Fixed Backticks Syntax
                dropdown.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`;
            });
        } catch(error) {
            console.error("Error loading folders: ", error);
        }
    }
    loadFoldersInDropdown();

    // २. निवडलेल्या सब-फोल्डरमध्ये PDF अपलोड करणे
    document.getElementById('upload-pdf-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const folderId = document.getElementById('select-folder').value;
        const title = document.getElementById('pdf-title').value;
        const file = document.getElementById('pdf-file').files[0];
        
        if(!file) return;

        showStatus('upload-status', '⏳ फाईल सुरक्षितपणे अपलोड होत आहे, कृपया थांबून राहा...', 'loading');

        try {
            // Fixed Backticks Syntax for Storage Reference
            const storageRef = ref(storage, `documents/${Date.now()}_${file.name}`);
            const snapshot = await uploadBytes(storageRef, file);
            const downloadURL = await getDownloadURL(snapshot.ref);

            await addDoc(collection(db, "documents"), {
                folderId: folderId,
                title: title,
                fileUrl: downloadURL,
                uploadedAt: new Date()
            });

            showStatus('upload-status', '✅ पत्रक/जीआर यशस्वीरीत्या अपलोड झाला!', 'success');
            document.getElementById('upload-pdf-form').reset();
        } catch (error) {
            showStatus('upload-status', '❌ अपलोड अयशस्वी: ' + error.message, 'error');
        }
    });
</script>
</body>
</html>
