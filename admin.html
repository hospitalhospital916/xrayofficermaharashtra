<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - X-ray Union</title>
  <style>
    :root { --primary-color: #0B3D91; --accent-color: #f4f7f6; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--accent-color); padding: 30px; color: #333; }
    .card { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.08); margin-bottom: 25px; border-left: 5px solid var(--primary-color); }
    input { padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; width: 95%; }
    button { padding: 10px 20px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; background: var(--primary-color); color: white; font-weight: 600; transition: 0.3s; }
    button:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn-del { background-color: #ff4d4d; }
    .hidden { display: none; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
    th { background-color: var(--primary-color); color: white; padding: 15px; text-align: left; }
    td { border-bottom: 1px solid #eee; padding: 12px; }
    tr:hover { background-color: #f9f9f9; }
  </style>
</head>
<body>

<div id="loginBox" class="card">
  <h3>Admin Login</h3>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p id="msg" style="color:red;"></p>
</div>

<div id="panelBox" class="hidden" class="card">
  <h3>सदस्य यादी (Members List)</h3>
  <button onclick="loadUsers()">सदस्य लोड करा</button>
  <button onclick="logout()">Logout</button>
  <input type="text" id="searchInput" onkeyup="filterUsers()" placeholder="नाव किंवा रुग्णालय शोधण्यासाठी टाईप करा...">
  
  <div id="usersList"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBVRXAra9pKpXbZYO4YkvbhuyWlKL8QVyk",
    authDomain: "xrayunionmah.firebaseapp.com",
    projectId: "xrayunionmah",
    storageBucket: "xrayunionmah.firebasestorage.app",
    messagingSenderId: "763805226978",
    appId: "1:763805226978:web:6bae81a0b6358b47d88bbb"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.login = async () => {
    try { await signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value); }
    catch (e) { document.getElementById("msg").textContent = e.message; }
  };

  window.logout = () => signOut(auth);

  window.loadUsers = async () => {
    const snap = await getDocs(collection(db, "members"));
    let html = '<table><tr><th>नाव</th><th>रुग्णालय</th><th>मोबाईल</th><th>Action</th></tr>';
    
    snap.forEach(d => {
      const data = d.data();
      html += `<tr class="user-row">
        <td>${data.नाव || ''}</td>
        <td>${data["कार्यरत रुग्णालयाचे नाव व पत्ता"] || ''}</td>
        <td>${data["मोबाईल क्रमांक"] || ''}</td>
        <td><button class="btn-del" onclick="deleteMember('${d.id}')">Delete</button></td>
      </tr>`;
    });
    
    html += '</table>';
    document.getElementById("usersList").innerHTML = html;
  };

  window.deleteMember = async (id) => {
    if(confirm("तुम्हाला हा सदस्य डिलीट करायचा आहे का?")) {
      await deleteDoc(doc(db, "members", id));
      alert("सदस्य डिलीट झाला!");
      loadUsers();
    }
  };

  window.filterUsers = () => {
    const val = document.getElementById("searchInput").value.toLowerCase();
    const rows = document.getElementsByClassName("user-row");
    for(let row of rows) {
      row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
    }
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("panelBox").classList.remove("hidden");
    } else {
      document.getElementById("loginBox").classList.remove("hidden");
      document.getElementById("panelBox").classList.add("hidden");
    }
  });
</script>
</body>
</html>
