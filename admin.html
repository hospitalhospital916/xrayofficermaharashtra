<!DOCTYPE html>
<html>
<body>
    <h2>ॲडमिन: सूचना पट्टी अपडेट करा</h2>
    <input type="text" id="tickerInput" placeholder="नवीन सूचना लिहा..." style="width: 80%; padding: 10px;">
    <button onclick="saveTicker()" style="padding: 10px 20px; background: #0B3D91; color: white;">अपडेट करा</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBVRXAra9pKpXbZYO4YkvbhuyWlKL8QVyk",
          authDomain: "xrayunionmah.firebaseapp.com",
          projectId: "xrayunionmah",
          storageBucket: "xrayunionmah.firebasestorage.app",
          messagingSenderId: "763805226978",
          appId: "1:763805226978:web:6bae81a0b6358b47d88bbb",
          measurementId: "G-EQS6WH6XLF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.saveTicker = async function() {
            const text = document.getElementById("tickerInput").value;
            await setDoc(doc(db, "settings", "marquee"), { text: text });
            alert("सूचना यशस्वीरित्या अपडेट झाली!");
        }
    </script>
</body>
</html>
