<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <style>
    body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
    .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    td, th { border: 1px solid #ddd; padding: 10px; }
    button { padding: 8px; cursor: pointer; border: none; border-radius: 4px; color: white; }
    input { width: 80%; padding: 10px; margin: 5px; }
  </style>
</head>
<body>
<div class="card">
  <h2>ॲडमिन पॅनल</h2>
  <input type="text" id="marqueeInput" placeholder="आडवी पट्टी अपडेट करा">
  <button style="background:#0B3D91;" onclick="updateData('marquee', 'marqueeInput')">अपडेट पट्टी</button>
  <br>
  <input type="text" id="newsInput" placeholder="ताज्या घडामोडी अपडेट करा">
  <button style="background:#0B3D91;" onclick="updateData('latest_news', 'newsInput')">अपडेट बातम्या</button>
</div>

<div class="card" id="usersList">लोड होत आहे...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBVRXAra9pKpXbZYO4YkvbhuyWlKL8QVyk",
    authDomain: "xrayunionmah.firebaseapp.com",
    projectId: "xrayunionmah",
    storageBucket: "xrayunionmah.firebasestorage.app",
    messagingSenderId: "763805226978",
    appId: "1:763805226978:web:6bae81a0b6358b47d88bbb"
  };

  const db = getFirestore(initializeApp(firebaseConfig));

  window.updateData = async (docName, inputId) => {
    const val = document.getElementById(inputId).value;
    await updateDoc(doc(db, "settings", docName), { text: val });
    alert("अपडेट झाले!");
  };

  async function loadData() {
    const snap = await getDocs(collection(db, "members"));
    let html = '<table><tr><th>नाव</th><th>मोबाईल</th><th>Action</th></tr>';
    snap.forEach(d => {
      const data = d.data();
      html += `<tr><td>${data["नाव"]}</td><td>${data["मोबाईल क्रमांक"]}</td>
      <td><button style="background:green;" onclick="alert('Edit clicked')">Edit</button>
      <button style="background:red;" onclick="deleteDoc(doc(db,'members','${d.id}')); location.reload()">Del</button></td></tr>`;
    });
    document.getElementById("usersList").innerHTML = html + '</table>';
  }
  loadData();
</script>
</body>
</html>
