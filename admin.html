<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <style>
    body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th { background: #0B3D91; color: white; padding: 10px; }
    td { border-bottom: 1px solid #ddd; padding: 8px; }
  </style>
</head>
<body>

<div id="usersList">डेटा लोड होत आहे...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBVRXAra9pKpXbZYO4YkvbhuyWlKL8QVyk",
    authDomain: "xrayunionmah.firebaseapp.com",
    projectId: "xrayunionmah",
    storageBucket: "xrayunionmah.firebasestorage.app",
    messagingSenderId: "763805226978",
    appId: "1:763805226978:web:6bae81a0b6358b47d88bbb"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function loadData() {
    const snap = await getDocs(collection(db, "members"));
    let html = '<table border="1"><tr><th>पूर्ण नाव</th><th>रुग्णालय</th><th>मोबाईल</th><th>सेवार्थ आयडी</th></tr>';
    
    snap.forEach(d => {
      const data = d.data();
      // तुमच्या डेटाबेस मधील फील्डची नावे जशी आहेत तशी वापरली आहेत
      const fullName = `${data["नाव"] || ''} ${data["वडिलांचे / मधले नाव"] || ''} ${data["आडनाव"] || ''}`;
      
      html += `<tr>
        <td>${fullName}</td>
        <td>${data["कार्यरत रुग्णालयाचे नाव व पत्ता"] || ''}</td>
        <td>${data["मोबाईल क्रमांक"] || ''}</td>
        <td>${data["सेवार्थ आयडी क्रमांक"] || ''}</td>
      </tr>`;
    });
    
    html += '</table>';
    document.getElementById("usersList").innerHTML = html;
  }

  loadData();
</script>
</body>
</html>
