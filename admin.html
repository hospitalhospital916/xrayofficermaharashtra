<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - X-ray Union</title>
  <style>
    :root { --primary-color: #0B3D91; --accent-color: #f4f7f6; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--accent-color); padding: 20px; color: #333; }
    .card { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); margin-bottom: 25px; border-left: 6px solid var(--primary-color); }
    /* डॅशबोर्ड स्टाईल */
    .dashboard-header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
    .logo { width: 80px; height: 80px; border-radius: 50%; }
    .stats-card { background: var(--primary-color); color: white; padding: 20px; border-radius: 10px; text-align: center; }
    .btn-action { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; background: var(--primary-color); color: white; font-weight: 600; }
  </style>
</head>
<body>

<!-- लॉगिन सेक्शन -->
<div id="loginBox" class="card">
  <h3>Admin Login</h3>
  <input id="email" type="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- डॅशबोर्ड सेक्शन -->
<div id="panelBox" class="hidden">
  <div class="card">
    <div class="dashboard-header">
      <img src="logo.png" alt="Logo" class="logo"> <!-- इथे तुमच्या लोगोची लिंक टाका -->
      <div>
        <h2>क्ष-किरण वैज्ञानिक अधिकारी संघटना</h2>
        <p>राज्य कार्यकारिणी | प्रशासकीय डॅशबोर्ड</p>
      </div>
    </div>
    
    <div class="stats-card">
      <h3>एकूण सदस्य संख्या: <span id="memberCount">0</span></h3>
    </div>
  </div>

  <div class="card">
    <h3>सदस्य व्यवस्थापन</h3>
    <button class="btn-action" onclick="loadUsers()">डेटा रिफ्रेश करा</button>
    <button onclick="logout()" style="background:#666; border:none; color:white; padding:10px 20px; border-radius:8px;">Logout</button>
    <div id="usersList" style="margin-top:20px; overflow-x:auto;"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = { /* तुमची कॉन्फिगरेशन इथेच ठेवा */ };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // लॉगिन आणि लोड फंक्शन्स
  window.loadUsers = async () => {
    const snap = await getDocs(collection(db, "members"));
    document.getElementById("memberCount").textContent = snap.size; // सदस्य संख्या अपडेट
    
    let html = '<table style="width:100%; border-collapse:collapse;"><tr><th>नाव</th><th>जिल्हा</th><th>मोबाईल</th></tr>';
    snap.forEach(d => {
      const data = d.data();
      html += `<tr><td>${data["पूर्ण नाव"] || ''}</td><td>${data["जिल्हा"] || ''}</td><td>${data["मोबाईल क्रमांक"] || ''}</td></tr>`;
    });
    html += '</table>';
    document.getElementById("usersList").innerHTML = html;
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("panelBox").classList.remove("hidden");
      loadUsers(); // लॉगिन झाल्यावर आपोआप डेटा लोड होईल
    }
  });
</script>
</body>
</html>
