<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सदस्य लॉगिन | क्ष-किरण संघटना महाराष्ट्र</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0B3D91; --success: #10b981; --dark: #1e293b; --bg: #f0f4f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mukta', sans-serif; }
        body { background: linear-gradient(135deg, var(--dark), var(--primary)); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .login-box { background: rgba(255, 255, 255, 0.95); padding: 45px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; margin: 20px; }
        .login-box h2 { color: var(--success); margin-bottom: 25px; font-weight: 800; font-size: 2rem; }
        .login-box input { width: 100%; padding: 14px; margin: 12px 0; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 1.1rem; outline: none;}
        .login-box input:focus { border-color: var(--success); }
        .login-box button.btn-login { width: 100%; padding: 14px; margin-top: 15px; background: linear-gradient(90deg, var(--success), #27ae60); color: white; border: none; border-radius: 10px; font-size: 1.3rem; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .login-box button.btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }
        .login-box .home-link { display: inline-block; margin-top: 20px; color: var(--primary); text-decoration: none; font-weight: bold; font-size: 1.1rem; }
        .login-box .home-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <i class="fa fa-user-circle" style="font-size: 4rem; color: var(--success); margin-bottom: 10px;"></i>
        <h2>सदस्य लॉगिन कक्ष</h2>
        <input type="tel" id="memberMobile" placeholder="नोंदणीकृत मोबाईल क्रमांक" autocomplete="off" onkeydown="if(event.key === 'Enter') document.getElementById('memberPass').focus();">
        <input type="password" id="memberPass" placeholder="तुमचा पासवर्ड" onkeydown="if(event.key === 'Enter') window.loginMember();">
        <button class="btn-login" onclick="loginMember()">लॉगिन करा <i class="fa fa-arrow-right"></i></button>
        <a href="index.html" class="home-link"><i class="fa fa-home"></i> मुख्यपृष्ठावर परत जा</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBVRXAra9pKpXbZYO4YkvbhuyWlKL8QVyk", 
            authDomain: "xrayunionmah.firebaseapp.com",
            projectId: "xrayunionmah", 
            storageBucket: "xrayunionmah.firebasestorage.app",
            messagingSenderId: "763805226978", 
            appId: "1:763805226978:web:6bae81a0b6358b47d88bbb"
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);
        const auth = getAuth(app);

        // युझर आधीच लॉगिन असेल तर डॅशबोर्डवर पाठवा (Browser Back Button Protection)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.replace("member-dashboard.html");
            }
        });

        window.loginMember = async function() {
            let mobile = document.getElementById('memberMobile').value.trim();
            let pass = document.getElementById('memberPass').value.trim();
            
            if(!mobile || !pass) { 
                Swal.fire('त्रुटी', 'कृपया तुमचा नोंदणीकृत मोबाईल क्रमांक आणि पासवर्ड टाका.', 'warning'); 
                return; 
            }
            
            Swal.fire({title: 'तुमची माहिती तपासत आहे...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
            
            try {
                // प्रथम डेटाबेसमध्ये मोबाईल नंबर शोधा
                const q = query(collection(db, "members"), where("mobile", "==", mobile));
                const querySnapshot = await getDocs(q);
                
                if(querySnapshot.empty) {
                    Swal.fire('त्रुटी', 'या मोबाईल क्रमांकाची नोंदणी आढळली नाही. कृपया नोंदणीकृत मोबाईल क्रमांक वापरा.', 'error');
                    return;
                } 
                
                let memData = null;
                
                // डेटाबेसमधून ईमेल मिळवा
                querySnapshot.forEach((doc) => { 
                    memData = doc.data(); 
                });
                
                if(!memData || !memData.email) {
                    Swal.fire('त्रुटी', 'सदस्याची तांत्रिक माहिती अपूर्ण आहे. कृपया ॲडमिनशी संपर्क साधा.', 'error'); 
                    return;
                }

                // सिक्युरिटी चेक (ब्लॉक किंवा प्रलंबित आहे का ते तपासा)
                if(memData.loginDisabled) { 
                    Swal.fire('अवरोधित', 'तुमचे खाते ॲडमिनद्वारे बंद करण्यात आले आहे.', 'error'); 
                    return; 
                }
                if(memData.status === 'Pending') { 
                    Swal.fire('प्रलंबित', 'तुमची नोंदणी अद्याप ॲडमिनकडून मंजूर झालेली नाही.', 'warning'); 
                    return; 
                }
                
                // मोबाईल नंबरला जोडलेल्या ईमेल आणि पासवर्डने सुरक्षित Firebase Authentication लॉगिन
                await signInWithEmailAndPassword(auth, memData.email, pass);
                
                Swal.close(); 
                // लॉगिन यशस्वी, onAuthStateChanged आपोआप डॅशबोर्डवर redirect करेल
                
            } catch(error) { 
                console.error(error);
                let errorMsg = 'लॉगिन करताना तांत्रिक अडचण आली. कृपया पुन्हा प्रयत्न करा.';
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                    errorMsg = 'तुम्ही टाकलेला पासवर्ड चुकीचा आहे.';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMsg = 'खूप वेळा चुकीचा प्रयत्न केला आहे. कृपया थोड्या वेळाने प्रयत्न करा.';
                }
                Swal.fire('त्रुटी', errorMsg, 'error'); 
            }
        };
    </script>
</body>
</html>
