<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सदस्य लॉगिन | क्ष-किरण संघटना महाराष्ट्र</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #0B3D91; --success: #10b981; --dark: #1e293b; --bg: #f0f4f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mukta', sans-serif; }
        body { background: linear-gradient(135deg, var(--dark), var(--primary)); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .login-box { background: rgba(255, 255, 255, 0.95); padding: 45px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 100%; max-width: 420px; text-align: center; margin: 20px; }
        .login-box h2 { color: var(--success); margin-bottom: 25px; font-weight: 800; font-size: 2rem; }
        .login-box input { width: 100%; padding: 14px; margin: 12px 0; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 1.1rem; outline: none;}
        .login-box input:focus { border-color: var(--success); }
        
        .btn-login { width: 100%; padding: 14px; margin-top: 15px; background: linear-gradient(90deg, var(--success), #27ae60); color: white; border: none; border-radius: 10px; font-size: 1.3rem; font-weight: 800; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(16, 185, 129, 0.5); }
        
        .bottom-links { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .bottom-links a { text-decoration: none; font-weight: bold; font-size: 1.1rem; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .register-link { background: #e0f2fe; color: #0284c7; border: 1px solid #bae6fd; }
        .register-link:hover { background: #bae6fd; }
        .home-link { color: var(--primary); }
        .home-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <i class="fa fa-user-circle" style="font-size: 4rem; color: var(--success); margin-bottom: 10px;"></i>
        <h2>सदस्य लॉगिन कक्ष</h2>
        
        <input type="tel" id="memberMobile" placeholder="नोंदणीकृत मोबाईल क्रमांक" autocomplete="off" onkeydown="if(event.key === 'Enter') document.getElementById('memberPass').focus();" maxlength="10">
        <input type="password" id="memberPass" placeholder="तुमचा पासवर्ड" onkeydown="if(event.key === 'Enter') window.loginMember();">
        
        <button class="btn-login" onclick="loginMember()">लॉगिन करा <i class="fa fa-arrow-right"></i></button>
        
        <!-- नवीन जोडलेले नोंदणी आणि मुख्यपृष्ठ बटन्स -->
        <div class="bottom-links">
            <a href="member-registration.html" class="register-link"><i class="fa fa-user-plus"></i> नवीन सदस्य नोंदणी करा</a>
            <a href="index.html" class="home-link"><i class="fa fa-home"></i> मुख्यपृष्ठावर परत जा</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBVRXAra9pKpXbZYO4YkvbhuyWlKL8QVyk", 
            authDomain: "xrayunionmah.firebaseapp.com",
            projectId: "xrayunionmah"
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // जर युझर आधीच लॉगिन असेल तर डॅशबोर्डवर पाठवा
        window.onload = function() {
            if(localStorage.getItem("memberSession")) { 
                window.location.replace("member-dashboard.html"); 
            }
        };

        window.loginMember = async function() {
            let mobile = document.getElementById('memberMobile').value.trim();
            let pass = document.getElementById('memberPass').value.trim();
            
            if(!mobile || !pass) { 
                Swal.fire('त्रुटी', 'कृपया मोबाईल क्रमांक आणि पासवर्ड टाका.', 'warning'); 
                return; 
            }
            if(mobile.length !== 10) {
                Swal.fire('त्रुटी', 'कृपया १० अंकी योग्य मोबाईल क्रमांक टाका.', 'warning'); 
                return;
            }
            
            Swal.fire({title: 'लॉगिन तपासत आहे...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
            
            try {
                // डेटाबेसमध्ये मोबाईल नंबर शोधा
                const q = query(collection(db, "members"), where("mobile", "==", mobile));
                const querySnapshot = await getDocs(q);
                
                if(querySnapshot.empty) {
                    Swal.fire('त्रुटी', 'या मोबाईल क्रमांकाची नोंदणी आढळली नाही.', 'error');
                    return;
                } 
                
                let memData = null; 
                let memId = null;
                
                // पासवर्ड तपासा
                querySnapshot.forEach((doc) => { 
                    let data = doc.data();
                    if(data.pass === pass || data.password === pass) { 
                        memData = data; 
                        memId = doc.id; 
                    }
                });
                
                if(!memData) { 
                    Swal.fire('त्रुटी', 'तुम्ही टाकलेला पासवर्ड चुकीचा आहे.', 'error'); 
                    return; 
                }
                
                // सिक्युरिटी चेक (ब्लॉक किंवा प्रलंबित आहे का ते तपासा)
                if(memData.loginDisabled) { 
                    Swal.fire('अवरोधित', 'तुमचे लॉगिन ॲडमिनद्वारे बंद करण्यात आले आहे.', 'error'); 
                    return; 
                }
                if(memData.status === 'Pending') { 
                    Swal.fire('प्रलंबित', 'तुमची नोंदणी अद्याप मंजूर झालेली नाही.', 'warning'); 
                    return; 
                }
                
                // सुरक्षेसाठी लोकल स्टोरेजमध्ये पासवर्ड सेव्ह करू नका
                delete memData.pass;
                delete memData.password;
                
                // लॉगिन यशस्वी झाल्यावर डेटा लोकल स्टोरेजमध्ये सेव्ह करा
                memData.id = memId;
                localStorage.setItem("memberSession", JSON.stringify(memData));
                
                Swal.close(); 
                window.location.replace("member-dashboard.html");
                
            } catch(e) { 
                Swal.fire('त्रुटी', 'लॉगिन करताना तांत्रिक समस्या आली.', 'error'); 
                console.error(e); 
            }
        };
    </script>
</body>
</html>
