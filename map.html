<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>महाराष्ट्र सार्वजनिक आरोग्य विभाग - ८ मंडळे</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 5px; }
        p { text-align: center; color: #64748b; margin-top: 0; margin-bottom: 20px; }
        #map { height: 600px; width: 100%; max-width: 1200px; margin: 0 auto; border-radius: 12px; border: 2px solid #cbd5e1; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .legend { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); line-height: 24px; color: #334155; font-size: 14px; }
        .legend h4 { margin: 0 0 10px 0; color: #0f172a; }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; border-radius: 3px; border: 1px solid #94a3b8; }
    </style>
</head>
<body>

    <h2>सार्वजनिक आरोग्य विभाग, महाराष्ट्र शासन</h2>
    <p>८ आरोग्य मंडळे आणि त्यांचे अंतर्गत जिल्हे</p>
    
    <div id="map"></div>

    <script>
        // १. नकाशा सुरु करणे
        var map = L.map('map').setView([19.7515, 75.7139], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // २. आरोग्य मंडळांचे रंग 
        var circleColors = {
            "Thane": "#3b82f6",     
            "Nashik": "#10b981",    
            "Pune": "#ef4444",      
            "Kolhapur": "#f59e0b",  
            "CSN": "#8b5cf6",       
            "Latur": "#ec4899",     
            "Akola": "#0ea5e9",     
            "Nagpur": "#d946ef"     
        };

        // ३. जिल्ह्यांनुसार रंग मॅच करणे 
        function getStyle(feature) {
            let district = feature.properties.DISTRICT || feature.properties.NAME_2 || feature.properties.district || "";
            let color = "#ffffff"; 

            if (["Thane", "Palghar", "Raigad", "Raigarh", "Mumbai", "Mumbai City", "Mumbai Suburban"].includes(district)) color = circleColors.Thane;
            else if (["Nashik", "Dhule", "Nandurbar", "Jalgaon", "Ahmadnagar", "Ahmednagar", "Ahilyanagar"].includes(district)) color = circleColors.Nashik;
            else if (["Pune", "Satara", "Solapur"].includes(district)) color = circleColors.Pune;
            else if (["Kolhapur", "Sangli", "Ratnagiri", "Sindhudurg"].includes(district)) color = circleColors.Kolhapur;
            else if (["Aurangabad", "Chhatrapati Sambhajinagar", "Jalna", "Parbhani", "Hingoli"].includes(district)) color = circleColors.CSN;
            else if (["Latur", "Bid", "Beed", "Nanded", "Osmanabad", "Dharashiv"].includes(district)) color = circleColors.Latur;
            else if (["Akola", "Amravati", "Buldana", "Buldhana", "Washim", "Yavatmal"].includes(district)) color = circleColors.Akola;
            else if (["Nagpur", "Wardha", "Bhandara", "Gondiya", "Gondia", "Chandrapur", "Gadchiroli", "Garhchiroli"].includes(district)) color = circleColors.Nagpur;

            return { fillColor: color, weight: 1.5, opacity: 1, color: 'white', fillOpacity: 0.85 };
        }

        // ४. सर्वात खात्रीशीर डेटाबेस (Datameet Census 2011) मधून माहिती घेणे
        fetch('https://raw.githubusercontent.com/datameet/maps/master/Districts/Census_2011/2011_Dist.geojson')
            .then(response => {
                if (!response.ok) throw new Error("Network response failed");
                return response.json();
            })
            .then(data => {
                // संपूर्ण भारताच्या नकाशामधून फक्त 'महाराष्ट्र' वेगळा काढणे
                var mhFeatures = data.features.filter(f => f.properties.ST_NM === "Maharashtra");
                data.features = mhFeatures;

                var geojsonLayer = L.geoJSON(data, {
                    style: getStyle,
                    onEachFeature: function (feature, layer) {
                        let name = feature.properties.DISTRICT || feature.properties.NAME_2 || "अज्ञात";
                        layer.bindPopup("<b style='font-size:15px; color:#1e293b;'>जिल्हा: " + name + "</b>");
                        
                        layer.on({
                            mouseover: function(e) { e.target.setStyle({ weight: 3, color: '#0f172a', fillOpacity: 1 }); },
                            mouseout: function(e) { geojsonLayer.resetStyle(e.target); }
                        });
                    }
                }).addTo(map);

                // नकाशा आपोआप महाराष्ट्रावर झूम (Center) करणे
                map.fitBounds(geojsonLayer.getBounds());
            })
            .catch(err => {
                alert("⚠️ तांत्रिक त्रुटी: जिल्ह्यांचा नकाशा लोड होऊ शकला नाही.\n\nकारण: तुम्ही ही फाईल थेट कॉम्प्युटरवर उघडल्यामुळे ब्राऊझरने सुरक्षेच्या कारणास्तव (CORS Error) डेटा ब्लॉक केला आहे. \n\nहा नकाशा पाहण्यासाठी कृपया ही फाईल तुमच्या वेब सर्व्हरवर, लाईव्ह वेबसाईटवर किंवा 'Live Server' मध्ये उघडून पहा.");
                console.error("Map loading error: ", err);
            });

        // ५. सूची (Legend)
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<h4>आरोग्य मंडळे</h4>';
            div.innerHTML += '<i style="background:' + circleColors.Thane + '"></i> ठाणे<br>';
            div.innerHTML += '<i style="background:' + circleColors.Nashik + '"></i> नाशिक<br>';
            div.innerHTML += '<i style="background:' + circleColors.Pune + '"></i> पुणे<br>';
            div.innerHTML += '<i style="background:' + circleColors.Kolhapur + '"></i> कोल्हापूर<br>';
            div.innerHTML += '<i style="background:' + circleColors.CSN + '"></i> छ. संभाजीनगर<br>';
            div.innerHTML += '<i style="background:' + circleColors.Latur + '"></i> लातूर<br>';
            div.innerHTML += '<i style="background:' + circleColors.Akola + '"></i> अकोला<br>';
            div.innerHTML += '<i style="background:' + circleColors.Nagpur + '"></i> नागपूर<br>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
