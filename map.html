<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>महाराष्ट्र सार्वजनिक आरोग्य विभाग - ८ मंडळे</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        #map { height: 400px; width: 100%; border-radius: 0 0 12px 12px; }
        .legend { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.2); line-height: 20px; color: #334155; font-size: 12px; }
        .legend h4 { margin: 0 0 5px 0; color: #0f172a; font-size: 13px; }
        .legend i { width: 14px; height: 14px; float: left; margin-right: 6px; border-radius: 3px; border: 1px solid #94a3b8; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // १. नकाशा महाराष्ट्र केंद्रबिंदूवर सेट करणे
        var map = L.map('map', { zoomControl: true }).setView([19.7515, 75.7139], 7);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Iframe मध्ये लोड झाल्यावर साईज अचूक करण्यासाठी
        setTimeout(function() { map.invalidateSize(); }, 300);

        var mandalColors = {
            "ठाणे मंडळ": "#3b82f6",     
            "नाशिक मंडळ": "#10b981",    
            "पुणे मंडळ": "#ef4444",      
            "कोल्हापूर मंडळ": "#f59e0b",  
            "छत्रपती संभाजीनगर मंडळ": "#8b5cf6",       
            "लातूर मंडळ": "#ec4899",     
            "अकोला मंडळ": "#0ea5e9",     
            "नागपूर मंडळ": "#d946ef"     
        };

        const districtsData = [
            {name: "पुणे", lat: 18.5204, lng: 73.8567, mandal: "पुणे मंडळ"},
            {name: "सातारा", lat: 17.6805, lng: 74.0183, mandal: "पुणे मंडळ"},
            {name: "सोलापूर", lat: 17.6599, lng: 75.9064, mandal: "पुणे मंडळ"},
            {name: "ठाणे", lat: 19.2183, lng: 72.9781, mandal: "ठाणे मंडळ"},
            {name: "पालघर", lat: 19.6967, lng: 72.7654, mandal: "ठाणे मंडळ"},
            {name: "रायगड", lat: 18.5158, lng: 73.1822, mandal: "ठाणे मंडळ"},
            {name: "मुंबई शहर", lat: 18.9750, lng: 72.8258, mandal: "ठाणे मंडळ"},
            {name: "मुंबई उपनगर", lat: 19.1136, lng: 72.8697, mandal: "ठाणे मंडळ"},
            {name: "नाशिक", lat: 19.9975, lng: 73.7898, mandal: "नाशिक मंडळ"},
            {name: "अहमदनगर", lat: 19.0952, lng: 74.7496, mandal: "नाशिक मंडळ"},
            {name: "धुळे", lat: 20.9042, lng: 74.7749, mandal: "नाशिक मंडळ"},
            {name: "जळगाव", lat: 21.0077, lng: 75.5626, mandal: "नाशिक मंडळ"},
            {name: "नंदुरबार", lat: 21.3743, lng: 74.2468, mandal: "नाशिक मंडळ"},
            {name: "कोल्हापूर", lat: 16.7050, lng: 74.2433, mandal: "कोल्हापूर मंडळ"},
            {name: "सांगली", lat: 16.8524, lng: 74.5815, mandal: "कोल्हापूर मंडळ"},
            {name: "रत्नागिरी", lat: 16.9902, lng: 73.3120, mandal: "कोल्हापूर मंडळ"},
            {name: "सिंधुदुर्ग", lat: 16.1497, lng: 73.6933, mandal: "कोल्हापूर मंडळ"},
            {name: "छत्रपती संभाजीनगर", lat: 19.8762, lng: 75.3433, mandal: "छत्रपती संभाजीनगर मंडळ"},
            {name: "जालना", lat: 19.8410, lng: 75.8860, mandal: "छत्रपती संभाजीनगर मंडळ"},
            {name: "परभणी", lat: 19.2620, lng: 76.7767, mandal: "छत्रपती संभाजीनगर मंडळ"},
            {name: "हिंगोली", lat: 19.7172, lng: 77.1486, mandal: "छत्रपती संभाजीनगर मंडळ"},
            {name: "लातूर", lat: 18.4088, lng: 76.5604, mandal: "लातूर मंडळ"},
            {name: "धाराशिव", lat: 18.1760, lng: 76.0378, mandal: "लातूर मंडळ"},
            {name: "बीड", lat: 18.9890, lng: 75.7591, mandal: "लातूर मंडळ"},
            {name: "नांदेड", lat: 19.1383, lng: 77.3210, mandal: "लातूर मंडळ"},
            {name: "अकोला", lat: 20.7002, lng: 77.0083, mandal: "अकोला मंडळ"},
            {name: "अमरावती", lat: 20.9320, lng: 77.7523, mandal: "अकोला मंडळ"},
            {name: "बुलढाणा", lat: 20.5310, lng: 76.1856, mandal: "अकोला मंडळ"},
            {name: "वाशिम", lat: 20.1118, lng: 77.1367, mandal: "अकोला मंडळ"},
            {name: "यवतमाळ", lat: 20.3888, lng: 78.1204, mandal: "अकोला मंडळ"},
            {name: "नागपूर", lat: 21.1458, lng: 79.0882, mandal: "नागपूर मंडळ"},
            {name: "वर्धा", lat: 20.7453, lng: 78.6022, mandal: "नागपूर मंडळ"},
            {name: "भंडारा", lat: 21.1667, lng: 79.6500, mandal: "नागपूर मंडळ"},
            {name: "गोंदिया", lat: 21.4593, lng: 80.1989, mandal: "नागपूर मंडळ"},
            {name: "चंद्रपूर", lat: 19.9615, lng: 79.2961, mandal: "नागपूर मंडळ"},
            {name: "गडचिरोली", lat: 20.1827, lng: 79.9961, mandal: "नागपूर मंडळ"}
        ];

        let districtMemberCounts = {};
        let markersLayer = L.layerGroup().addTo(map);

        function renderMapMarkers() {
            markersLayer.clearLayers();
            districtsData.forEach(d => {
                let count = districtMemberCounts[d.name] || 0;
                let color = mandalColors[d.mandal] || "#3b82f6";
                let radius = Math.max(12000, count * 3000 + 10000); 

                var circle = L.circle([d.lat, d.lng], {
                    color: '#fff', weight: 2, fillColor: color, fillOpacity: 0.85, radius: radius
                });

                circle.bindPopup(`<b style='font-size:14px; color:#1e293b;'>जिल्हा: ${d.name}</b><br>मंडळ: ${d.mandal}<br><b style='color:#ef4444; font-size:13px;'>मान्य सदस्य: ${count}</b>`);
                circle.bindTooltip(`<b>${d.name}</b>: ${count}`, { permanent: true, direction: "center", className: "map-label" });

                markersLayer.addLayer(circle);
            });
        }

        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'UPDATE_MAP_DATA') {
                districtMemberCounts = event.data.data;
                renderMapMarkers(); 
            }
        });

        renderMapMarkers();
    </script>
</body>
</html>
